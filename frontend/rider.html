<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rider Portal</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="https://aiautomationsstorage.blob.core.windows.net/cbl/CBL%20PRIVATE%20MEMBERHIP%20ASSOCIATION%20SEAL.png" type="image/png">
</head>
<body>
    <header>Rider Portal</header>
    <div id="rider-app">
        <div id="auth-section">
            <h2>Login / Register</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            <button id="login-btn">Login</button>
            <button id="register-btn">Register</button>
        </div>
        <div id="booking-section">
            <h2>Book a Driver</h2>
            <input type="text" id="driver-id" placeholder="Driver ID">
            <button id="book-btn">Book Driver</button>
        </div>
        <div id="messaging-section">
            <h2>Send a Message</h2>
            <input type="text" id="message" placeholder="Your Message">
            <input type="text" id="driver-id-msg" placeholder="Driver ID">
            <button id="send-msg-btn">Send Message</button>
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database.js"></script>
    <script src="rider.js"></script>
</body>
</html>
