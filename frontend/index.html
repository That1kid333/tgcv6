<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CityBucketList</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="https://aiautomationsstorage.blob.core.windows.net/cbl/CBL%20PRIVATE%20MEMBERHIP%20ASSOCIATION%20SEAL.png" type="image/png">
</head>
<body>
    <header style="background-color: #333; color: #fff; padding: 1em; text-align: center;">
        <nav>
            <a href="#home">
                <img src="https://aiautomationsstorage.blob.core.windows.net/cbl/citybucketlist%20logo.png" alt="CityBucketList Logo" style="height: 50px; vertical-align: middle; margin-right: 20px;">
            </a>
            <ul style="list-style: none; margin: 0; padding: 0; display: inline-block;">
                <li style="display: inline-block; margin-right: 20px;"><a href="#home" style="color: #fff; text-decoration: none;">Home</a></li>
                <li style="display: inline-block; margin-right: 20px;"><a href="rider.html" style="color: #fff; text-decoration: none;">Rider Portal</a></li>
                <li style="display: inline-block; margin-right: 20px;"><a href="driver.html" style="color: #fff; text-decoration: none;">Driver Portal</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section id="hero" style="background-image: url('https://aiautomationsstorage.blob.core.windows.net/cbl/CBL%20PRIVATE%20MEMBERHIP%20ASSOCIATION%20SEAL.png'); background-size: cover;">
            <div class="content">
                <h1>Need a Ride?</h1>
                <p>Private Rider Association Sign-up & Scheduler</p>
                <form id="rider-signup">
                    <input type="text" placeholder="Name" required>
                    <input type="tel" placeholder="Phone" required>
                    <input type="text" placeholder="Pickup Location" required>
                    <input type="text" placeholder="Drop-off Location" required>
                    <button type="submit">Schedule</button>
                </form>
            </div>
        </section>
        <section id="driver-registration">
            <h2>Register as a Driver</h2>
            <form id="driver-signup">
                <input type="text" placeholder="Name" required>
                <input type="tel" placeholder="Phone" required>
                <input type="text" placeholder="Vehicle Information" required>
                <input type="text" placeholder="License Number" required>
                <input type="text" placeholder="Insurance Details" required>
                <button type="submit">Register</button>
            </form>
        </section>
    </main>
    <footer>
        <p> 2024 by CITYBUCKETLIST.COM, LLC</p>
    </footer>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database.js"></script>
    <script src="app.js"></script>
</body>
</html>
